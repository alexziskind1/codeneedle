# Small fixture for fast iteration. ~50KB / ~14K tokens — fits in any context.
# 11 named functions with ≥20 body lines.

[files]
directory = "fixtures"
glob = "http_server.py"
limit = 1

[sample]
k = 16    # falls back to all 11 since the file has fewer
seed = 42

[model]
name = "qwen3.6-35b-a3b"
base_url = "http://localhost:1234"
temperature = 0.0
max_tokens = 6000           # generous to cover qwen3.x reasoning + ~20 lines
suppress_thinking = true    # appends /no_think (ignored by qwen3.6 anyway, harmless otherwise)
